<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>XV ADMIN PRO</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI,Arial,sans-serif;
background:#f8f0f5;
text-align:center;
color:#444;
}

header{
background:#b06b8c;
color:white;
padding:20px;
font-size:28px;
font-weight:bold;
}

.contenedor{
background:white;
width:90%;
max-width:550px;
margin:20px auto;
padding:20px;
border-radius:20px;
box-shadow:0 5px 15px #ccc;
}

.estadisticas{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.caja{
background:#f8f0f5;
padding:15px;
border-radius:15px;
font-size:18px;
}

input{
width:85%;
padding:12px;
margin:8px;
border-radius:20px;
border:1px solid #ccc;
font-size:16px;
}

button{
background:#b06b8c;
color:white;
border:none;
padding:12px 20px;
border-radius:25px;
cursor:pointer;
margin:5px;
}

.tarjeta{
background:#f8f0f5;
padding:15px;
margin-top:15px;
border-radius:15px;
text-align:left;
}

.enlace{
font-size:12px;
word-break:break-all;
}

.entrada{
color:green;
font-weight:bold;
}

.pendiente{
color:#b06b8c;
font-weight:bold;
}

.qr{
text-align:center;
margin-top:15px;
}

</style>

</head>


<body>


<header>

🌸 XV ADMIN PRO 🌸

</header>
<div class="contenedor">

<h2>📊 Estadísticas</h2>

<div class="estadisticas">

<div class="caja">
👥<br>
<span id="total">0</span>
<br>
Invitados
</div>


<div class="caja">
✅<br>
<span id="confirmados">0</span>
<br>
Confirmados
</div>


<div class="caja">
⏳<br>
<span id="pendientes">0</span>
<br>
Pendientes
</div>


<div class="caja">
🚪<br>
<span id="entradas">0</span>
<br>
Entradas
</div>


</div>

</div>



<div class="contenedor">

<h2>➕ Crear invitado</h2>


<input id="nombre" placeholder="Nombre del invitado">


<input id="lugares" type="number" placeholder="Número de lugares">


<br>


<button id="crear">

Crear invitación

</button>


<p id="mensaje"></p>


</div>




<div class="contenedor">

<h2>👥 Lista de invitados</h2>


<div id="lista">

Cargando...

</div>


</div>
<script type="module">


import { initializeApp } 
from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";


import { 
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc,
updateDoc
}
from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";



const firebaseConfig = {

apiKey: "AIzaSyA1xfKwUsdIm_s5Pr8b3aViVA48LOQX2Zk",

authDomain: "invitaciones-de-xv-ab404.firebaseapp.com",

projectId: "invitaciones-de-xv-ab404",

storageBucket: "invitaciones-de-xv-ab404.firebasestorage.app",

messagingSenderId: "454618394738",

appId: "1:454618394738:web:10d5e57467be38bb24d2eb"

};



const app = initializeApp(firebaseConfig);


const db = getFirestore(app);



function generarCodigo(){

return "XV-" + Math.random()
.toString(36)
.substring(2,8)
.toUpperCase();

}



document.getElementById("crear")
.addEventListener("click", async()=>{


let nombre =
document.getElementById("nombre").value;


let lugares =
document.getElementById("lugares").value;


let mensaje =
document.getElementById("mensaje");



if(nombre==="" || lugares===""){


mensaje.innerHTML="⚠️ Completa los datos";


return;


}



let codigo = generarCodigo();



await addDoc(

collection(db,"invitados"),

{


nombre:nombre,

lugares:Number(lugares),

codigo:codigo,

confirmado:false,

entrada:false,

horaEntrada:null,

fechaConfirmacion:null


}

);



mensaje.innerHTML =

"✅ Invitación creada<br>Código: "+codigo;



document.getElementById("nombre").value="";


document.getElementById("lugares").value="";


mostrarInvitados();


});
async function mostrarInvitados(){


let lista =
document.getElementById("lista");


lista.innerHTML="";


let total=0;

let confirmados=0;

let pendientes=0;

let entradas=0;



const datos =
await getDocs(collection(db,"invitados"));



datos.forEach((item)=>{


let invitado=item.data();



total++;



if(invitado.confirmado){

confirmados++;

}else{

pendientes++;

}



if(invitado.entrada){

entradas++;

}



let enlace =

"https://dh-scanautentic.github.io/Xv-de-sofia./?id="

+invitado.codigo;



lista.innerHTML += `


<div class="tarjeta">


<b>👤 ${invitado.nombre}</b>


<br>

👥 Lugares: ${invitado.lugares}


<br>


${invitado.confirmado ?

"✅ Confirmado"

:

"⏳ Pendiente"}


<br>


${invitado.entrada ?

"<span class='entrada'>🚪 Ya ingresó</span>"

:

"<span class='pendiente'>🚫 Sin entrada</span>"}



<br><br>


<div class="enlace">

${enlace}

</div>



<br>



<button onclick="copiar('${enlace}')">

📋 Copiar

</button>



<button onclick="registrarEntrada('${item.id}')">

🚪 Entrada

</button>



<button onclick="mostrarQR('${item.id}','${enlace}')">

📱 QR

</button>


<button onclick="guardarQR('${item.id}')">

💾 Guardar QR

</button>


<button onclick="whatsapp('${enlace}','${invitado.nombre}')">

📲 WhatsApp

</button>

<button onclick="eliminar('${item.id}')">

🗑 Eliminar

</button>



<div id="qr-${item.id}" class="qr"></div>



</div>



`;



});



document.getElementById("total").innerHTML=total;

document.getElementById("confirmados").innerHTML=confirmados;

document.getElementById("pendientes").innerHTML=pendientes;

document.getElementById("entradas").innerHTML=entradas;



}
window.mostrarQR=function(id,enlace){

window.guardarQR=function(id){

let qr =
document.querySelector("#qr-"+id+" img");


if(!qr){

alert("Primero genera el QR");

return;

}


let enlace = document.createElement("a");

enlace.href = qr.src;

enlace.download = "QR-invitacion.png";

enlace.click();


}
let contenedor =
document.getElementById("qr-"+id);


contenedor.innerHTML="";


new QRCode(contenedor,{

text: enlace,

width:180,

height:180

});


}




window.copiar=function(texto){

navigator.clipboard.writeText(texto);

alert("Enlace copiado ✅");

}




window.registrarEntrada=async function(id){


if(confirm("¿Registrar entrada de este invitado?")){


await updateDoc(

doc(db,"invitados",id),

{

entrada:true,

horaEntrada:new Date()

}

);

window.whatsapp=function(enlace,nombre){

let mensaje =
"Hola "+nombre+" 🌸\n\n"+
"Te comparto tu invitación de XV años:\n\n"+
enlace;


let url =
"https://wa.me/?text=" + encodeURIComponent(mensaje);


window.open(url,"_blank");

}

mostrarInvitados();


}


}





window.eliminar=async function(id){


if(confirm("¿Eliminar invitado?")){


await deleteDoc(

doc(db,"invitados",id)

);


mostrarInvitados();


}


}



mostrarInvitados();



</script>


</body>

</html>
