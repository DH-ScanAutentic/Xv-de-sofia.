<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>XV ADMIN</title>

<style>

body{
margin:0;
font-family:Segoe UI,Arial,sans-serif;
background:#f8f0f5;
text-align:center;
color:#444;
}

header{
background:#b06b8c;
color:white;
padding:20px;
font-size:28px;
font-weight:bold;
}

.contenedor{
background:white;
width:90%;
max-width:500px;
margin:20px auto;
padding:20px;
border-radius:20px;
box-shadow:0 5px 15px #ccc;
}

input{
width:85%;
padding:12px;
margin:8px;
border-radius:20px;
border:1px solid #ccc;
font-size:16px;
}

button{
background:#b06b8c;
color:white;
border:none;
padding:12px 20px;
border-radius:25px;
cursor:pointer;
margin:5px;
}

.tarjeta{
background:#f8f0f5;
padding:15px;
margin-top:15px;
border-radius:15px;
text-align:left;
}

.enlace{
font-size:12px;
word-break:break-all;
}

</style>

</head>


<body>


<header>
🌸 XV ADMIN PRO 🌸
</header>


<div class="contenedor">

<h2>➕ Crear invitado</h2>


<input id="nombre" placeholder="Nombre del invitado">


<input id="lugares" type="number" placeholder="Número de lugares">


<br>


<button id="crear">
Crear invitación
</button>


<p id="mensaje"></p>


</div>



<div class="contenedor">

<h2>👥 Invitados</h2>


<div id="lista">
Cargando...
</div>


</div>


<script type="module">

import { initializeApp } 
from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";


import { 
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc
}
from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";


const firebaseConfig = {

apiKey: "AIzaSyA1xfKwUsdIm_s5Pr8b3aViVA48LOQX2Zk",

authDomain: "invitaciones-de-xv-ab404.firebaseapp.com",

projectId: "invitaciones-de-xv-ab404",

storageBucket: "invitaciones-de-xv-ab404.firebasestorage.app",

messagingSenderId: "454618394738",

appId: "1:454618394738:web:10d5e57467be38bb24d2eb"

};


const app = initializeApp(firebaseConfig);

const db = getFirestore(app);


function generarCodigo(){

return "XV-" + Math.random()
.toString(36)
.substring(2,8)
.toUpperCase();

}
document.getElementById("crear")
.addEventListener("click", async()=>{


let nombre =
document.getElementById("nombre").value;


let lugares =
document.getElementById("lugares").value;


let mensaje =
document.getElementById("mensaje");



if(nombre==="" || lugares===""){

mensaje.innerHTML="⚠️ Completa los datos";

return;

}



let codigo = generarCodigo();



await addDoc(
collection(db,"invitados"),
{

nombre:nombre,

lugares:Number(lugares),

codigo:codigo,

confirmado:false,

fechaConfirmacion:null

}

);



mensaje.innerHTML =
"✅ Invitación creada<br>Código: "+codigo;



document.getElementById("nombre").value="";

document.getElementById("lugares").value="";


mostrarInvitados();


});




async function mostrarInvitados(){


let lista =
document.getElementById("lista");


lista.innerHTML="";



const datos =
await getDocs(collection(db,"invitados"));



datos.forEach((item)=>{


let invitado = item.data();



let enlace =

"https://dh-scanautentic.github.io/Xv-de-sofia./?id="

+invitado.codigo;



lista.innerHTML += `


<div class="tarjeta">


<b>👤 ${invitado.nombre}</b>

<br>

👥 Lugares: ${invitado.lugares}

<br>

${invitado.confirmado ?

"✅ Confirmado"

:

"⏳ Pendiente"}


<br><br>


<div class="enlace">

${enlace}

</div>


<br>


<button onclick="copiar('${enlace}')">

📋 Copiar

</button>


<button onclick="whatsapp('${enlace}','${invitado.nombre}')">

📲 WhatsApp

</button>


<button onclick="eliminar('${item.id}')">

🗑 Eliminar

</button>


</div>


`;



});


}





window.copiar=function(texto){

navigator.clipboard.writeText(texto);

alert("Enlace copiado ✅");

}




window.whatsapp=function(enlace,nombre){


let texto =

"Hola "+nombre+
", te comparto tu invitación de XV años 🌸\n\n"
+enlace;


window.open(

"https://wa.me/?text="
+encodeURIComponent(texto)

);


}




window.eliminar=async function(id){


if(confirm("¿Eliminar invitado?")){


await deleteDoc(
doc(db,"invitados",id)
);


mostrarInvitados();


}


}



mostrarInvitados();



</script>


</body>

</html>
