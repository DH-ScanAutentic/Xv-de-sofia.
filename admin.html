<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>XV Admin Pro</title>

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:#f8f0f5;
text-align:center;
color:#444;
}

header{
background:#b06b8c;
color:white;
padding:20px;
font-size:28px;
font-weight:bold;
}


.contenedor{
width:90%;
max-width:500px;
margin:20px auto;
background:white;
padding:20px;
border-radius:20px;
box-shadow:0 5px 15px #ccc;
}


input{
width:85%;
padding:12px;
margin:8px;
border-radius:20px;
border:1px solid #ccc;
font-size:16px;
}


button{
background:#b06b8c;
color:white;
border:none;
padding:12px 20px;
border-radius:25px;
margin:5px;
cursor:pointer;
}


button:hover{
background:#8e4f6d;
}


.tarjeta{
background:#f8f0f5;
padding:15px;
margin-top:15px;
border-radius:15px;
text-align:left;
}


.enlace{
font-size:13px;
word-break:break-all;
}


</style>

</head>


<body>


<header>
🌸 XV ADMIN PRO 🌸
</header>


<div class="contenedor">


<h2>➕ Nuevo invitado</h2>


<input 
id="nombre"
placeholder="Nombre del invitado">


<input 
id="lugares"
type="number"
placeholder="Número de lugares">


<br>


<button id="crear">

Crear invitación

</button>


<p id="mensaje"></p>


</div>



<div class="contenedor">


<h2>👥 Lista de invitados</h2>


<div id="lista">

Cargando...

</div>


</div>

<script type="module">


import { initializeApp } 
from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";


import { 
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc
}
from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";



const firebaseConfig = {

apiKey: "AIzaSyA1xfKwUsdIm_s5Pr8b3aViVA48LOQX2Zk",

authDomain: "invitaciones-de-xv-ab404.firebaseapp.com",

projectId: "invitaciones-de-xv-ab404",

storageBucket: "invitaciones-de-xv-ab404.firebasestorage.app",

messagingSenderId: "454618394738",

appId: "1:454618394738:web:10d5e57467be38bb24d2eb"

};



const app = initializeApp(firebaseConfig);
alert("Firebase cargó correctamente");


const db = getFirestore(app);

alert("Firebase conectado");

function generarCodigo(){

return "XV-" +

Math.random()
.toString(36)
.substring(2,8)
.toUpperCase();

}




document.getElementById("crear")
.addEventListener("click", async()=>{


let nombre =
document.getElementById("nombre").value;


let lugares =
document.getElementById("lugares").value;



if(nombre==="" || lugares===""){

document.getElementById("mensaje").innerHTML =
"⚠️ Completa los datos";

return;

}



let codigo = generarCodigo();



await addDoc(

collection(db,"invitados"),

{

nombre:nombre,

lugares:Number(lugares),

codigo:codigo,

confirmado:false,

fechaConfirmacion:null

}


);



document.getElementById("mensaje").innerHTML =

"✅ Invitación creada<br>"+codigo

</body>

</html>
